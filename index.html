<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boogies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,700;1,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --br: #5C2A14;
      --ink: #111;
      --mid: #888;
      --bg: #fafaf8;
      --card: #F2EFEB;
      --divider: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: 64px;
    }

    /* ─── HERO ─── */
    .hero {
      background: var(--br);
      padding: 60px 28px 0;
      animation: up 0.6s ease both;
    }

    .hero-top { padding-bottom: 28px; }

    .brand {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(3.2rem, 14vw, 3.8rem);
      color: #fff;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 44px;
    }

    .hero-wave { display: block; width: 100%; margin-bottom: -2px; }

    /* ─── SECTION ─── */
    .section {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── SPREAD ─── */
    .spread {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      animation: up 0.5s 0.12s ease both;
    }

    .spread-spine { background: rgba(0,0,0,0.08); margin: 20px 0; }

    .page-books {
      padding: 24px 20px 28px;
      display: flex;
      flex-direction: column;
    }

    .page-club {
      padding: 24px 18px 20px;
      display: flex;
      flex-direction: column;
    }

    .page-num {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.6rem;
      color: rgba(92,42,20,0.3);
      letter-spacing: 0.08em;
    }

    .page-cat {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--br);
      letter-spacing: -0.025em;
      line-height: 1;
      padding-top: 28px;
    }

    .club-list { margin-top: 14px; display: flex; flex-direction: column; }
    .club-item {}

    .club-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
      gap: 6px;
    }

    .club-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .club-plus {
      font-size: 0.9rem;
      color: var(--mid);
      transition: transform 0.25s;
      flex-shrink: 0;
      font-weight: 300;
    }

    .club-item.open .club-plus { transform: rotate(45deg); }

    .club-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.28s ease;
    }

    .club-item.open .club-detail { grid-template-rows: 1fr; }
    .club-detail-inner { overflow: hidden; }

    .club-desc {
      font-size: 0.72rem;
      color: var(--mid);
      line-height: 1.65;
      padding-bottom: 10px;
    }

    /* ─── LINKS ─── */
    .links {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: up 0.5s 0.22s ease both;
    }

    a.lnk {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card);
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    a.lnk:active { transform: scale(0.97); }
    .lnk-l { display: flex; flex-direction: column; gap: 2px; }
    .lnk-name { font-size: 0.88rem; font-weight: 600; letter-spacing: -0.01em; }
    .lnk-sub { font-size: 0.72rem; color: var(--mid); }
    .lnk-arr { color: #ccc; font-size: 1rem; }

    /* ─── FOOT ─── */
    .foot {
      margin-top: auto;
      padding: 40px 0 0;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: #ccc;
      animation: up 0.5s 0.3s ease both;
    }



    /* ─── BOOKS SHEET ─── */
    .book-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      padding: 4px 2px 24px;
    }

    .book-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .book-cover {
      aspect-ratio: 3 / 4;
      border-radius: 6px;
      overflow: hidden;
      background: var(--card);
      position: relative;
    }

    .book-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .book-cover-placeholder {
      width: 100%;
      height: 100%;
      background: var(--card);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.6rem;
      color: var(--mid);
      text-align: center;
      padding: 8px;
      line-height: 1.4;
    }

    .book-title-small {
      font-size: 0.68rem;
      font-weight: 600;
      color: var(--ink);
      line-height: 1.3;
      letter-spacing: -0.01em;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    .book-author-small {
      font-size: 0.62rem;
      color: var(--mid);
      margin-top: -2px;
    }

    /* book detail modal */
    .book-detail {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 300;
      display: flex;
      align-items: flex-end;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .book-detail.active {
      opacity: 1;
      pointer-events: all;
    }

    .book-detail-inner {
      background: #fff;
      border-radius: 24px 24px 0 0;
      width: 100%;
      max-width: 430px;
      margin: 0 auto;
      padding: 28px 24px 48px;
      transform: translateY(20px);
      transition: transform 0.3s ease;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .book-detail.active .book-detail-inner {
      transform: translateY(0);
    }

    .book-detail-top {
      display: flex;
      gap: 16px;
      align-items: flex-start;
    }

    .book-detail-cover {
      width: 80px;
      flex-shrink: 0;
      aspect-ratio: 3/4;
      border-radius: 6px;
      overflow: hidden;
      background: var(--card);
    }

    .book-detail-cover img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }

    .book-detail-meta {
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding-top: 2px;
    }

    .book-detail-title {
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.3;
    }

    .book-detail-author {
      font-size: 0.78rem;
      color: var(--mid);
    }

    .book-detail-publisher {
      font-size: 0.72rem;
      color: var(--mid);
      margin-top: 2px;
    }

    .book-comment {
      font-size: 0.78rem;
      color: #aaa;
      line-height: 1.75;
      font-style: italic;
      border-left: 2px solid #e8e4e0;
      padding-left: 12px;
      margin-top: 4px;
    }

    .book-detail-close {
      position: absolute;
      top: 20px;
      right: 20px;
      background: none;
      border: none;
      font-size: 1.4rem;
      color: var(--mid);
      cursor: pointer;
      line-height: 1;
    }

    /* ─── FLIP CARDS ─── */
    .sheet-month-scroll {
      padding: 12px 16px;
      border-bottom: 1px solid var(--divider);
      flex-shrink: 0;
    }

    .month-strip {
      display: flex;
      gap: 6px;
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
      scrollbar-width: none;
    }
    .month-strip::-webkit-scrollbar { display: none; }

    .month-btn {
      flex-shrink: 0;
      padding: 6px 12px;
      border-radius: 20px;
      border: 1px solid var(--divider);
      background: none;
      font-family: 'DM Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--mid);
      cursor: pointer;
      transition: all 0.15s;
      -webkit-tap-highlight-color: transparent;
    }

    .month-btn.active {
      background: var(--br);
      color: #fff;
      border-color: var(--br);
    }

    .card-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      padding: 4px 2px 16px;
    }

    .card-empty-state {
      display: flex;
      align-items: center;
      justify-content: center;
      height: 200px;
      font-size: 0.8rem;
      color: var(--mid);
    }

    .flip-card {
      aspect-ratio: 55 / 85;
      perspective: 800px;
      cursor: pointer;
      position: relative;
    }

    .flip-inner {
      position: absolute;
      inset: 0;
      transform-style: preserve-3d;
      transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
      border-radius: 10px;
    }

    .flip-card.flipped .flip-inner {
      transform: rotateY(180deg);
    }

    .flip-front, .flip-back {
      position: absolute;
      inset: 0;
      border-radius: 10px;
      overflow: hidden;
      backface-visibility: hidden;
      -webkit-backface-visibility: hidden;
      background: var(--card);
    }

    .flip-front img, .flip-back img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
    }

    .flip-back {
      transform: rotateY(180deg);
    }

    .card-placeholder {
      width: 100%;
      height: 100%;
      background: var(--card);
    }

    /* ─── BOTTOM SHEET ─── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .sheet-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      height: 85dvh;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sheet.active {
      transform: translateX(-50%) translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      padding: 20px 24px 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--divider);
    }

    .sheet-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--br);
      letter-spacing: -0.02em;
    }

    .sheet-sub {
      font-size: 0.72rem;
      color: var(--mid);
      margin-top: 3px;
    }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* diary grid */
    .diary-grid {
      display: flex;
      flex-direction: row;
      gap: 10px;
      overflow-x: auto;
      scroll-snap-type: x mandatory;
      -webkit-overflow-scrolling: touch;
      padding-bottom: 8px;
    }

    .diary-grid::-webkit-scrollbar { display: none; }

    .year-break {
      display: none;
    }

    .diary-item {
      flex-shrink: 0;
      width: 120px;
      scroll-snap-align: start;
    }

    .diary-item { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }

    .diary-thumb {
      width: 120px;
      height: 170px;
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.15s;
      flex-shrink: 0;
    }

    .diary-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .diary-item:active .diary-thumb { transform: scale(0.96); }

    .diary-label {
      font-size: 0.62rem;
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* fullscreen viewer */
    .viewer {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .viewer.active { opacity: 1; pointer-events: all; }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .viewer-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 1.6rem;
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<script>
  function openSheet() {
    document.getElementById('sheet').classList.add('active');
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
  }


  // ── BOOKS DATA ──
  // 책 추가: { isbn: 'ISBN13', comment: '코멘트(선택)' }
  const BOOKS = [
    { isbn: '9788936434120', comment: '조용하지만 강렬하게 밀려오는 소설. 읽고 나서 한동안 멍했어요.' },
    { isbn: '9788954651929', comment: '문장 하나하나가 시처럼 느껴졌어요.' },
    { isbn: '9788932473154', comment: '나의 이야기이기도 했고, 주변 모든 사람의 이야기이기도 했어요.' },
    { isbn: '9788901270777', comment: '감정을 모른다는 것이 이런 의미일 수 있겠구나.' },
    { isbn: '9788965745754', comment: 'SF인데 따뜻해요. 이상한 조합인데 이 작가만 할 수 있어요.' },
    { isbn: '9788936352981', comment: '읽는 내내 마음이 무거웠지만, 꼭 읽어야 하는 책이라고 생각해요.' },
  ];

  const bookCache = {};

  async function fetchBook(isbn) {
    if (bookCache[isbn]) return bookCache[isbn];
    // Direct cover URL — no API call needed
    const cover = `https://books.google.com/books/content?vid=ISBN${isbn}&printsec=frontcover&img=1&zoom=2&source=gbs_api`;
    try {
      const res = await fetch(`https://www.googleapis.com/books/v1/volumes?q=isbn:${isbn}`);
      const data = await res.json();
      const info = data.items?.[0]?.volumeInfo || {};
      const meta = {
        title: info.title || '',
        author: (info.authors || []).join(', '),
        publisher: info.publisher || '',
        date: info.publishedDate?.slice(0, 7) || '',
        cover,
      };
      bookCache[isbn] = meta;
      return meta;
    } catch {
      return { cover, title: '', author: '', publisher: '', date: '' };
    }
  }

  let booksRendered = false;

  async function renderBooks() {
    if (booksRendered) return;
    booksRendered = true;
    const grid = document.getElementById('book-grid');
    grid.innerHTML = BOOKS.map((b, i) => `
      <div class="book-item" onclick="openBookDetail(${i})">
        <div class="book-cover" id="cover-${i}">
          <div class="book-cover-placeholder">—</div>
        </div>
      </div>
    `).join('');

    BOOKS.forEach(async (b, i) => {
      const meta = await fetchBook(b.isbn);
      const el = document.getElementById(`cover-${i}`);
      if (el && meta.cover) {
        el.innerHTML = `<img src="${meta.cover}" alt="">`;
      }
    });
  }

  function openBooksSheet() {
    document.getElementById('books-sheet').classList.add('active');
    document.getElementById('books-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
    renderBooks();
  }

  function closeBooksSheet() {
    document.getElementById('books-sheet').classList.remove('active');
    document.getElementById('books-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  async function openBookDetail(i) {
    const b = BOOKS[i];
    const meta = await fetchBook(b.isbn);
    document.getElementById('detail-cover').src = meta.cover || '';
    document.getElementById('detail-title').textContent = meta.title;
    document.getElementById('detail-author').textContent = meta.author;
    document.getElementById('detail-publisher').textContent =
      [meta.publisher, meta.date].filter(Boolean).join(' · ');
    const commentWrap = document.getElementById('detail-comment-wrap');
    if (b.comment) {
      commentWrap.style.display = 'block';
      document.getElementById('detail-comment').textContent = b.comment;
    } else {
      commentWrap.style.display = 'none';
    }
    document.getElementById('book-detail').classList.add('active');
  }

  function closeBookDetail() {
    document.getElementById('book-detail').classList.remove('active');
  }

  function selectMonth(key) {
    document.querySelectorAll('.card-grid').forEach(g => g.style.display = 'none');
    document.querySelectorAll('.month-btn').forEach(b => b.classList.remove('active'));
    const grid = document.getElementById('grid-' + key);
    if (grid) grid.style.display = 'flex';
    const emptyState = document.querySelector('.card-empty-state');
    if (emptyState) emptyState.style.display = 'none';
    document.querySelector(`.month-btn[data-key="${key}"]`).classList.add('active');
  }

  function openPhotoSheet() {
    document.getElementById('photo-sheet').classList.add('active');
    document.getElementById('photo-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closePhotoSheet() {
    document.getElementById('photo-sheet').classList.remove('active');
    document.getElementById('photo-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  function openViewer(src) {
    if (!src) return;
    document.getElementById('viewer-img').src = src;
    document.getElementById('viewer').classList.add('active');
  }

  function closeViewer() {
    document.getElementById('viewer').classList.remove('active');
  }
</script>
