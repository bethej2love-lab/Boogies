<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boogies</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,700;1,9..40,700&display=swap" rel="stylesheet">
  <link rel="stylesheet" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --br: #5C2A14;
      --ink: #111;
      --mid: #888;
      --bg: #fafaf8;
      --card: #F2EFEB;
      --divider: rgba(0,0,0,0.08);
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Pretendard', -apple-system, sans-serif;
      -webkit-font-smoothing: antialiased;
      overflow-x: hidden;
    }

    .wrap {
      max-width: 430px;
      margin: 0 auto;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: 64px;
    }

    /* ─── HERO ─── */
    .hero {
      background: var(--br);
      padding: 60px 28px 0;
      animation: up 0.6s ease both;
    }

    .hero-top { padding-bottom: 28px; }

    .brand {
      font-family: 'DM Sans', sans-serif;
      font-style: italic;
      font-weight: 700;
      font-size: clamp(3.2rem, 14vw, 3.8rem);
      color: #fff;
      line-height: 0.95;
      letter-spacing: -0.03em;
    }

    .brand-sub {
      font-size: 0.75rem;
      color: rgba(255,255,255,0.4);
      letter-spacing: 0.14em;
      text-transform: uppercase;
      margin-top: 44px;
    }

    .hero-wave { display: block; width: 100%; margin-bottom: -2px; }

    /* ─── SECTION ─── */
    .section {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* ─── SPREAD ─── */
    .spread {
      background: var(--card);
      border-radius: 20px;
      overflow: hidden;
      display: grid;
      grid-template-columns: 1fr 1px 1fr;
      animation: up 0.5s 0.12s ease both;
    }

    .spread-spine { background: rgba(0,0,0,0.08); margin: 20px 0; }

    .page-books {
      padding: 24px 20px 28px;
      display: flex;
      flex-direction: column;
    }

    .page-club {
      padding: 24px 18px 20px;
      display: flex;
      flex-direction: column;
    }

    .page-num {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.6rem;
      color: rgba(92,42,20,0.3);
      letter-spacing: 0.08em;
    }

    .page-cat {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.6rem;
      color: var(--br);
      letter-spacing: -0.025em;
      line-height: 1;
      padding-top: 28px;
    }

    .club-list { margin-top: 14px; display: flex; flex-direction: column; }
    .club-item {}

    .club-trigger {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 0;
      background: none;
      border: none;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
      text-align: left;
      gap: 6px;
    }

    .club-name {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--ink);
      letter-spacing: -0.01em;
      line-height: 1.3;
    }

    .club-plus {
      font-size: 0.9rem;
      color: var(--mid);
      transition: transform 0.25s;
      flex-shrink: 0;
      font-weight: 300;
    }

    .club-item.open .club-plus { transform: rotate(45deg); }

    .club-detail {
      display: grid;
      grid-template-rows: 0fr;
      transition: grid-template-rows 0.28s ease;
    }

    .club-item.open .club-detail { grid-template-rows: 1fr; }
    .club-detail-inner { overflow: hidden; }

    .club-desc {
      font-size: 0.72rem;
      color: var(--mid);
      line-height: 1.65;
      padding-bottom: 10px;
    }

    /* ─── LINKS ─── */
    .links {
      padding: 16px 16px 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
      animation: up 0.5s 0.22s ease both;
    }

    a.lnk {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      background: var(--card);
      border-radius: 16px;
      text-decoration: none;
      color: var(--ink);
      -webkit-tap-highlight-color: transparent;
      transition: transform 0.1s;
    }

    a.lnk:active { transform: scale(0.97); }
    .lnk-l { display: flex; flex-direction: column; gap: 2px; }
    .lnk-name { font-size: 0.88rem; font-weight: 600; letter-spacing: -0.01em; }
    .lnk-sub { font-size: 0.72rem; color: var(--mid); }
    .lnk-arr { color: #ccc; font-size: 1rem; }

    /* ─── FOOT ─── */
    .foot {
      margin-top: auto;
      padding: 40px 0 0;
      text-align: center;
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      color: #ccc;
      animation: up 0.5s 0.3s ease both;
    }

    /* ─── BOTTOM SHEET ─── */
    .sheet-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s;
    }

    .sheet-overlay.active {
      opacity: 1;
      pointer-events: all;
    }

    .sheet {
      position: fixed;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%) translateY(100%);
      width: 100%;
      max-width: 430px;
      height: 85dvh;
      background: #fff;
      border-radius: 24px 24px 0 0;
      z-index: 101;
      display: flex;
      flex-direction: column;
      transition: transform 0.4s cubic-bezier(0.32, 0.72, 0, 1);
    }

    .sheet.active {
      transform: translateX(-50%) translateY(0);
    }

    .sheet-handle {
      width: 36px;
      height: 4px;
      background: #ddd;
      border-radius: 2px;
      margin: 14px auto 0;
      flex-shrink: 0;
    }

    .sheet-header {
      padding: 20px 24px 14px;
      flex-shrink: 0;
      border-bottom: 1px solid var(--divider);
    }

    .sheet-title {
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 1.2rem;
      color: var(--br);
      letter-spacing: -0.02em;
    }

    .sheet-sub {
      font-size: 0.72rem;
      color: var(--mid);
      margin-top: 3px;
    }

    .sheet-body {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      -webkit-overflow-scrolling: touch;
    }

    /* diary grid */
    .diary-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .diary-item { display: flex; flex-direction: column; gap: 5px; cursor: pointer; }

    .diary-thumb {
      aspect-ratio: 210 / 297; /* A4 */
      background: var(--card);
      border-radius: 8px;
      overflow: hidden;
      transition: transform 0.15s;
    }

    .diary-thumb img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .diary-item:active .diary-thumb { transform: scale(0.96); }

    .year-break {
      grid-column: 1 / -1;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 0.68rem;
      color: rgba(92,42,20,0.35);
      letter-spacing: 0.1em;
      padding: 8px 0 2px;
    }

    .diary-label {
      font-size: 0.62rem;
      color: var(--mid);
      text-align: center;
      letter-spacing: 0.04em;
    }

    /* fullscreen viewer */
    .viewer {
      position: fixed;
      inset: 0;
      background: #000;
      z-index: 200;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.25s;
    }

    .viewer.active { opacity: 1; pointer-events: all; }

    .viewer img {
      max-width: 100%;
      max-height: 100%;
      object-fit: contain;
    }

    .viewer-close {
      position: absolute;
      top: 20px;
      right: 20px;
      color: #fff;
      font-size: 1.6rem;
      background: none;
      border: none;
      cursor: pointer;
      line-height: 1;
      opacity: 0.7;
    }

    @keyframes up {
      from { opacity: 0; transform: translateY(16px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>

<script>
  function openSheet() {
    document.getElementById('sheet').classList.add('active');
    document.getElementById('overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closeSheet() {
    document.getElementById('sheet').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  function openPhotoSheet() {
    document.getElementById('photo-sheet').classList.add('active');
    document.getElementById('photo-overlay').classList.add('active');
    document.body.style.overflow = 'hidden';
  }

  function closePhotoSheet() {
    document.getElementById('photo-sheet').classList.remove('active');
    document.getElementById('photo-overlay').classList.remove('active');
    document.body.style.overflow = '';
  }

  function openViewer(src) {
    if (!src) return;
    document.getElementById('viewer-img').src = src;
    document.getElementById('viewer').classList.add('active');
  }

  function closeViewer() {
    document.getElementById('viewer').classList.remove('active');
  }
</script>
